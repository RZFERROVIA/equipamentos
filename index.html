<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0C3D6B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Equipamentos">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Controle de Equipamentos</title>
  <style>
    :root {
      --bg: #0C1B2E;
      --bg2: #112240;
      --bg3: #1A3358;
      --card: #162B47;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --text: #E8F0FA;
      --text2: #8BA4C0;
      --text3: #5A7A99;
      --blue: #1E6FC4;
      --blue-light: #3B8FE8;
      --green: #0E7A4E;
      --green-light: #18A96A;
      --red: #B83232;
      --red-light: #E05050;
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .app-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .app-header h1 { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
    .app-header p { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .section { padding: 14px 16px 0; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px;
    }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
    }

    .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .header-grid .full { grid-column: 1 / -1; }

    .field label {
      display: block; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 4px;
    }
    .field input, .field select {
      width: 100%; height: 38px; padding: 0 10px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 13px; font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--blue-light); }
    .field input::placeholder { color: var(--text3); }

    .summary {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 12px;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      min-height: 36px; margin-bottom: 10px;
    }
    .summary-empty { font-size: 12px; color: var(--text3); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-RM { background: rgba(14,122,78,0.2);  color: #7AF5C0; border: 1px solid rgba(14,122,78,0.4); }
    .badge-DM { background: rgba(184,50,50,0.2);  color: #F5A0A0; border: 1px solid rgba(184,50,50,0.4); }
    .badge-L  { background: rgba(184,50,50,0.2);  color: #F5A0A0; border: 1px solid rgba(184,50,50,0.4); }
    .badge-D  { background: rgba(14,122,78,0.2);  color: #7AF5C0; border: 1px solid rgba(14,122,78,0.4); }
    .badge-SE { background: rgba(14,122,78,0.2);  color: #7AF5C0; border: 1px solid rgba(14,122,78,0.4); }
    .badge-SS { background: rgba(184,50,50,0.2);  color: #F5A0A0; border: 1px solid rgba(184,50,50,0.4); }

    .eq-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
    }
    .eq-item-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; }
    .eq-num { font-size: 11px; color: var(--text3); font-weight: 700; min-width: 18px; }
    .eq-item select {
      flex: 1; height: 34px; padding: 0 8px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 12px; font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .eq-item select:focus { outline: none; border-color: var(--blue-light); }

    .del-btn {
      width: 32px; height: 32px;
      background: rgba(184,50,50,0.12); border: 1px solid rgba(184,50,50,0.25);
      border-radius: var(--radius-sm); color: var(--red-light);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    .eq-item-body { padding: 0 12px 10px; display: flex; flex-direction: column; gap: 8px; }
    .eq-item-body input, .eq-item-body select {
      width: 100%; height: 34px; padding: 0 10px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 12px; font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .eq-item-body input:focus, .eq-item-body select:focus { outline: none; border-color: var(--blue-light); }
    .eq-item-body input::placeholder { color: var(--text3); }
    .eq-item-body label {
      font-size: 10px; color: var(--text3); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      display: block; margin-bottom: 3px;
    }

    .subst-panel { display: none; padding: 0 12px 10px; }
    .subst-panel.show { display: block; }
    .subst-inner {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px;
    }
    .subst-inner p { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
    .subst-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .subst-card label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; display: block; margin-bottom: 4px;
    }
    .subst-card.saiu label { color: #F5A0A0; }
    .subst-card.entrou label { color: #7AF5C0; }
    .subst-card input {
      width: 100%; height: 34px; padding: 0 8px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 12px; font-family: inherit;
    }
    .subst-card input:focus { outline: none; border-color: var(--blue-light); }
    .subst-card input::placeholder { color: var(--text3); }
    .subst-ref { font-size: 10px; color: var(--text3); margin-top: 3px; min-height: 14px; }
    .subst-ref.ok { color: #7AF5C0; }
    .rm-alert {
      font-size: 11px; background: rgba(184,50,50,0.15); color: #F5A0A0;
      border: 1px solid rgba(184,50,50,0.3); border-radius: var(--radius-sm);
      padding: 5px 8px; margin-top: 6px; display: none;
    }
    .rm-alert.show { display: block; }

    .btn-add {
      width: 100%; height: 44px;
      background: rgba(24,169,106,0.12); border: 1px dashed rgba(24,169,106,0.4);
      border-radius: var(--radius); color: #7AF5C0;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-bottom: 10px;
    }
    .btn-add:active { background: rgba(24,169,106,0.2); }

    .count-badge { font-size: 11px; color: var(--text3); text-align: center; padding: 4px 0 2px; }

    .footer-actions {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 10px 16px; display: flex; gap: 8px; z-index: 50;
    }
    .btn {
      height: 44px; border-radius: var(--radius);
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: none; transition: opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { opacity: 0.75; }
    .btn-salvar { flex: 1; background: var(--blue); color: #fff; }
    .btn-wa { flex: 1.5; background: #1aaa5e; color: #fff; font-size: 14px; }
    .btn-limpar { width: 44px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); font-size: 18px; }

    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 16px; width: 100%; max-height: 85vh; overflow-y: auto;
    }
    .modal-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .modal-box textarea {
      width: 100%; height: 220px; padding: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 12px; font-family: 'Courier New', monospace; resize: none;
    }
    .modal-hint {
      font-size: 11px; color: var(--text2); margin-top: 8px; line-height: 1.5;
      background: rgba(30,111,196,0.1); border: 1px solid rgba(30,111,196,0.2);
      border-radius: var(--radius-sm); padding: 8px 10px;
    }
    .modal-footer { display: flex; gap: 8px; margin-top: 12px; }
    .modal-footer .btn { flex: 1; height: 40px; font-size: 13px; }

    .toast {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); padding: 8px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600; z-index: 999;
      opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    select option { background: #1A3358; color: #E8F0FA; }
  </style>
</head>
<body>

<div class="app-header">
  <h1>⚙️ Controle de Equipamentos</h1>
  <p id="header-sub">Ferroviários — nova folha</p>
</div>

<div class="section">
  <div class="section-title">Cabeçalho da folha</div>
  <div class="card">
    <div class="header-grid">
      <div class="field">
        <label>Folha Nº</label>
        <input type="text" id="nfolha" value="001">
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="fdata">
      </div>
      <div class="field full">
        <label>Empresa</label>
        <input type="text" id="empresa" placeholder="Nome da empresa">
      </div>
      <div class="field">
        <label>Contrato</label>
        <input type="text" id="contrato" placeholder="Nº ou nome">
      </div>
      <div class="field">
        <label>Cidade</label>
        <input type="text" id="cidade" placeholder="Cidade">
      </div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">Equipamentos</div>
  <div class="summary" id="summary-bar">
    <span class="summary-empty">Nenhum item ainda</span>
  </div>
  <div id="eq-rows"></div>
  <button class="btn-add" onclick="addRow()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/>
    </svg>
    Adicionar equipamento
  </button>
  <div class="count-badge" id="count-label">0 itens na folha</div>
</div>

<!-- Modal WhatsApp -->
<div class="modal-bg" id="modal-wa">
  <div class="modal-box">
    <h3>📱 Mensagem para WhatsApp</h3>
    <textarea id="wa-text" readonly></textarea>
    <div class="modal-hint">
      💡 Copie o texto e envie no grupo do WhatsApp.
    </div>
    <div class="modal-footer">
      <button class="btn" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)" onclick="copiarWA()">Copiar</button>
      <button class="btn" style="background:#1aaa5e;color:#fff" onclick="abrirWA()">Abrir WhatsApp</button>
      <button class="btn" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)" onclick="fecharModal('modal-wa')">Fechar</button>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer-actions">
  <button class="btn btn-salvar" onclick="salvarRegistro()">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M13 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V5l-3-3z"/>
      <polyline points="13 5 10 5 10 2"/><rect x="4" y="9" width="8" height="5"/>
    </svg>
    Salvar
  </button>
  <button class="btn btn-wa" onclick="gerarWhatsapp()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 1.4.37 2.72 1.02 3.86L0 16l4.26-1.01A8 8 0 108 0zm0 14.4A6.4 6.4 0 012.8 5.2a6.4 6.4 0 0110.9 4.52A6.4 6.4 0 018 14.4zm3.5-4.8c-.19-.1-1.12-.56-1.3-.62-.17-.06-.3-.1-.42.1-.12.19-.47.62-.58.75-.1.13-.22.14-.41.05-.2-.1-.83-.31-1.58-.99-.58-.52-.98-1.16-1.09-1.36-.11-.19-.01-.3.08-.39l.38-.44c.09-.1.12-.19.18-.32.06-.13.03-.24-.01-.34-.05-.1-.43-1.03-.59-1.41-.15-.36-.31-.31-.43-.32H5.6c-.12 0-.32.05-.48.24-.17.19-.64.62-.64 1.52s.65 1.76.74 1.88c.1.13 1.27 1.93 3.07 2.71.43.19.77.3 1.03.38.43.14.83.12 1.14.07.35-.05 1.07-.44 1.22-.86.15-.42.15-.78.1-.86-.04-.08-.17-.13-.36-.22z"/>
    </svg>
    Gerar WhatsApp
  </button>
  <button class="btn btn-limpar" onclick="confirmarLimpar()" title="Limpar tudo">🗑</button>
</div>

<div class="toast" id="toast"></div>

<script>
const EQS = [
  "CARRINHO C/ SUPORTE",
  "ESMERILHADEIRA ELÉTRICA MP5",
  "ESMERILHADEIRA ELÉTRICA MP12",
  "FURADEIRA DORMENTE PT8",
  "FURADEIRA DORMENTE PORTÁTIL",
  "FURADEIRA TRILHO VÍDEA",
  "GERADOR DE ENERGIA BRANCO",
  "MACACO MECÂNICO",
  "MACACO HIDRÁULICO",
  "PÉ DE PATO (SOCADOR MANUAL)",
  "POLICORTE (GEISMAR)",
  "POLICORTE (HUSQVARNA)",
  "REBARBADORA HIDRÁULICA (GESIMAR)",
  "REBARBADORA HIDRÁULICA (NACIONAIS)",
  "TIREFONADORA PORTÁTIL",
  "CONJUNTO AUTOPORTANTE",
  "GERADOR JACKSON"
];

const LEGS = [
  {v:"",   l:"— selecione —"},
  {v:"RM", l:"RM — Retirada manutenção"},
  {v:"DM", l:"DM — Devolução manutenção"},
  {v:"L",  l:"L — Nova locação"},
  {v:"D",  l:"D — Devolução de locação"},
  {v:"SE", l:"SE — Substituição entrada"},
  {v:"SS", l:"SS — Substituição saída"}
];

const LEG_MAP = {
  RM: "Retirada manutenção",
  DM: "Devolução manutenção",
  L:  "Nova locação",
  D:  "Devolução de locação",
  SE: "Substituição entrada",
  SS: "Substituição saída"
};

const LEG_CLS = {
  RM:"badge-RM", DM:"badge-DM",
  L:"badge-L",   D:"badge-D",
  SE:"badge-SE", SS:"badge-SS"
};

const LEG_DIR = {
  RM: "← Entrada | Retirada manutenção",
  DM: "→ Saída | Devolução manutenção",
  L:  "→ Saída | Nova locação",
  D:  "← Entrada | Devolução de locação",
  SE: "← Entrada | Substituição entrada",
  SS: "→ Saída | Substituição saída"
};

let rowCount = 0;

document.getElementById('fdata').value = new Date().toISOString().split('T')[0];
atualizarHeaderSub();

function atualizarHeaderSub() {
  const emp  = document.getElementById('empresa').value;
  const ctto = document.getElementById('contrato').value;
  const sub  = [emp, ctto].filter(Boolean).join(' · ');
  document.getElementById('header-sub').textContent = sub || 'Ferroviários — nova folha';
}
document.getElementById('empresa').addEventListener('input', atualizarHeaderSub);
document.getElementById('contrato').addEventListener('input', atualizarHeaderSub);

function eqOpts(sel) {
  return ['<option value="">— equipamento —</option>',
    ...EQS.map(e => `<option value="${e}"${e===sel?' selected':''}>${e}</option>`)
  ].join('');
}

function legOpts(sel) {
  return LEGS.map(l => `<option value="${l.v}"${l.v===sel?' selected':''}>${l.l}</option>`).join('');
}

function addRow() {
  const id   = rowCount++;
  const cont = document.getElementById('eq-rows');
  const num  = cont.children.length + 1;
  const div  = document.createElement('div');
  div.className = 'eq-item';
  div.id = 'item-' + id;

  div.innerHTML = `
    <div class="eq-item-header">
      <span class="eq-num" id="rnum-${id}">${num}</span>
      <select id="eq-${id}" onchange="atualizar()">${eqOpts('')}</select>
      <div class="del-btn" onclick="removeRow(${id})">✕</div>
    </div>
    <div class="eq-item-body">
      <div>
        <label>Patrimônio</label>
        <input type="text" id="pat-${id}" placeholder="Número do patrimônio" oninput="atualizar()" inputmode="text" autocomplete="off">
      </div>
      <div>
        <label>Legenda</label>
        <select id="leg-${id}" onchange="onLegChange(${id})">${legOpts('')}</select>
      </div>
      <div>
        <label>Observação</label>
        <input type="text" id="obs-${id}" placeholder="Observação (opcional)" autocomplete="off">
      </div>
    </div>
    <div class="subst-panel" id="sp-${id}">
      <div class="subst-inner">
        <p>↕ Substituição — informe os dois patrimônios:</p>
        <div class="subst-grid">
          <div class="subst-card saiu">
            <label>↑ Saiu</label>
            <input type="text" id="pat-saiu-${id}" placeholder="Pat. que saiu" oninput="onSaiuInput(${id})">
            <div class="subst-ref" id="ref-saiu-${id}"></div>
            <div class="rm-alert" id="rm-alert-${id}">⚠ Nenhum RM encontrado para este patrimônio.</div>
          </div>
          <div class="subst-card entrou">
            <label>↓ Entrou</label>
            <input type="text" id="pat-entrou-${id}" placeholder="Pat. que entrou">
            <div class="subst-ref" id="ref-entrou-${id}"></div>
          </div>
        </div>
      </div>
    </div>
  `;

  cont.appendChild(div);
  atualizar();
  setTimeout(() => div.scrollIntoView({behavior:'smooth', block:'center'}), 100);
}

function onLegChange(id) {
  const leg = document.getElementById('leg-' + id).value;
  const sp  = document.getElementById('sp-'  + id);
  if (leg === 'SE' || leg === 'SS') {
    sp.classList.add('show');
    const pat = document.getElementById('pat-' + id).value.trim();
    if (pat) document.getElementById('pat-entrou-' + id).value = pat;
  } else {
    sp.classList.remove('show');
  }
  atualizar();
}

function onSaiuInput(id) {
  const pat = document.getElementById('pat-saiu-' + id).value.trim().toUpperCase();
  const al  = document.getElementById('rm-alert-' + id);
  const ref = document.getElementById('ref-saiu-' + id);
  if (!pat) { al.classList.remove('show'); ref.textContent = ''; return; }
  const hist  = getHistorico();
  const found = hist.find(h => h.pat.toUpperCase() === pat && h.leg === 'RM');
  if (found) {
    al.classList.remove('show');
    ref.textContent  = '✓ RM em ' + found.data + ' — Folha ' + found.folha;
    ref.className = 'subst-ref ok';
  } else {
    al.classList.add('show');
    ref.textContent = '';
    ref.className = 'subst-ref';
  }
}

function getHistorico() {
  try { return JSON.parse(localStorage.getItem('hist_rm') || '[]'); } catch(e) { return []; }
}

function salvarHistorico(registros) {
  const hist  = getHistorico();
  const nf    = document.getElementById('nfolha').value || '—';
  const dt    = document.getElementById('fdata').value  || '—';
  const dtFmt = dt ? dt.split('-').reverse().join('/') : dt;
  registros.forEach(r => {
    if (r.leg === 'RM') hist.push({pat: r.pat, eq: r.eq, leg: 'RM', folha: nf, data: dtFmt});
  });
  try { localStorage.setItem('hist_rm', JSON.stringify(hist.slice(-300))); } catch(e) {}
}

function removeRow(id) {
  document.getElementById('item-' + id)?.remove();
  renumerar();
  atualizar();
}

function renumerar() {
  document.querySelectorAll('#eq-rows .eq-item').forEach((r, i) => {
    const rid = r.id.replace('item-', '');
    const n   = document.getElementById('rnum-' + rid);
    if (n) n.textContent = i + 1;
  });
}

function atualizar() {
  const rows = document.querySelectorAll('#eq-rows .eq-item');
  document.getElementById('count-label').textContent =
    rows.length + (rows.length === 1 ? ' item na folha' : ' itens na folha');

  const counts = {};
  let total = 0;
  rows.forEach(r => {
    const rid = r.id.replace('item-', '');
    const leg = document.getElementById('leg-' + rid)?.value;
    const pat = document.getElementById('pat-' + rid)?.value.trim();
    if (leg && pat) { counts[leg] = (counts[leg] || 0) + 1; total++; }
  });

  const bar = document.getElementById('summary-bar');
  if (!total) {
    bar.innerHTML = '<span class="summary-empty">Preencha patrimônio e legenda para ver o resumo</span>';
    return;
  }
  bar.innerHTML = Object.entries(counts)
    .map(([k,v]) => `<span class="badge ${LEG_CLS[k]||''}">${LEG_DIR[k]||k} &nbsp;<strong>${v}x</strong></span>`)
    .join('');
}

function gerarWhatsapp() {
  const nf   = document.getElementById('nfolha').value   || '—';
  const dt   = document.getElementById('fdata').value;
  const emp  = document.getElementById('empresa').value  || '—';
  const ctto = document.getElementById('contrato').value || '—';
  const cid  = document.getElementById('cidade').value   || '—';
  const dtFmt = dt ? dt.split('-').reverse().join('/') : '—';

  const rows  = document.querySelectorAll('#eq-rows .eq-item');
  let linhas  = [];

  rows.forEach(r => {
    const rid = r.id.replace('item-', '');
    const eq  = document.getElementById('eq-'  + rid)?.value       || '';
    const pat = document.getElementById('pat-' + rid)?.value.trim() || '';
    const leg = document.getElementById('leg-' + rid)?.value       || '';
    const obs = document.getElementById('obs-' + rid)?.value.trim() || '';
    if (!pat || !leg) return;

    let linha = `• ${eq||'—'}\n  Pat: ${pat} | ${LEG_MAP[leg]||leg}${obs ? ' | Obs: '+obs : ''}`;

    if (leg === 'SE' || leg === 'SS') {
      const saiu   = document.getElementById('pat-saiu-'   + rid)?.value.trim() || '';
      const entrou = document.getElementById('pat-entrou-' + rid)?.value.trim() || '';
      if (saiu || entrou) linha += `\n  ↑ Saiu: ${saiu||'—'} → ↓ Entrou: ${entrou||'—'}`;
    }
    linhas.push(linha);
  });

  if (!linhas.length) { toast('Preencha ao menos um item ⚠'); return; }

  const msg =
    `*CONTROLE DE EQUIPAMENTOS*\n` +
    `Folha: ${nf} | Data: ${dtFmt}\n` +
    `Empresa: ${emp} | Contrato: ${ctto}\n` +
    `Cidade: ${cid}\n` +
    `${'─'.repeat(34)}\n` +
    linhas.join('\n') + '\n' +
    `${'─'.repeat(34)}`;

  document.getElementById('wa-text').value = msg;
  document.getElementById('modal-wa').classList.add('open');
}

function copiarWA() {
  const t = document.getElementById('wa-text');
  t.select();
  document.execCommand('copy');
  toast('Texto copiado! ✓');
}

function abrirWA() {
  window.open('https://wa.me/?text=' + encodeURIComponent(document.getElementById('wa-text').value), '_blank');
}

function fecharModal(id) {
  document.getElementById(id).classList.remove('open');
}

function salvarRegistro() {
  const rows = document.querySelectorAll('#eq-rows .eq-item');
  let registros = [];
  rows.forEach(r => {
    const rid = r.id.replace('item-', '');
    const eq  = document.getElementById('eq-'  + rid)?.value       || '';
    const pat = document.getElementById('pat-' + rid)?.value.trim() || '';
    const leg = document.getElementById('leg-' + rid)?.value       || '';
    if (pat) registros.push({eq, pat, leg});
  });
  if (!registros.length) { toast('Nenhum item para salvar ⚠'); return; }
  salvarHistorico(registros);
  toast(`Salvo! ${registros.length} item(ns) ✓`);
}

function confirmarLimpar() {
  if (confirm('Limpar todos os itens da folha?')) {
    document.getElementById('eq-rows').innerHTML = '';
    rowCount = 0;
    atualizar();
    toast('Folha limpa ✓');
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
